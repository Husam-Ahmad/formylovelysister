<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Mockup - Debug</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        .table th, .table td { vertical-align: middle; }
        .btn-simulate {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 9999;
            font-size: 18px;
        }
        #debug-log {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 420px;
            max-height: 350px;
            overflow: auto;
            background: #111;
            color: #0f0;
            font-family: monospace;
            font-size: 13px;
            padding: 12px;
            border-radius: 8px;
            z-index: 9999;
        }
        #debug-log b { color: #fff; font-size: 14px; }
        .log-ok { color: #0f0; }
        .log-click { color: #0ff; font-weight: bold; }
        .log-warn { color: #ff0; }
    </style>
</head>
<body style="background:#f8f9fa;">
    <button class="btn btn-warning btn-lg btn-simulate" id="simulateBtn">
        Simulate New Patient
    </button>

    <div class="container-fluid mt-3">
        <h4>Welcome Dr. FARAH AMOUS</h4>
        <div class="row mt-3">
            <div class="col-xl-8 col-lg-12">
                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover mb-0">
                                <thead>
                                    <tr>
                                        <th></th>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Age</th>
                                        <th>Arrival Time</th>
                                        <th>Number</th>
                                        <th>Call type</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="PatientPendTable">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-xl-4 col-lg-6">
                <div class="card">
                    <div class="card-header"><h3 class="card-title">Zoom Video Call</h3></div>
                    <div class="card-body text-center">
                        <div id="join-flow"></div>
                        <div id="sessionContainer"><div id="countdown"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Debug Log -->
    <div id="debug-log">
        <b>Debug Log</b><hr style="border-color:#333;margin:5px 0;">
        <div id="debug-log-content"></div>
    </div>

    <script src="test-mockup.js"></script>
</body>
</html>
